name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Test
      run: npx vitest run

    - name: Build
      run: npm run build
      env:
        DATABASE_URL: postgresql://user:password@localhost:5432/cuvote
        AUTH_SECRET: your-super-secret-auth-key-change-in-production
